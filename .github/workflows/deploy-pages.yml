name: Deploy to GitHub Pages

# Static site (no build step) deployed straight from the repo root.
# Replaces GitHub's managed "deploy from branch" workflow so we control the
# action versions — the managed one pins actions/checkout@v4 and
# actions/upload-artifact@v4 to the deprecated Node 20.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a run finish before the next starts; never cancel a live deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Actions are pinned to commit SHAs (tag noted alongside) so a repointed
    # tag can't swap in different code. Bump the SHA to update a version.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
